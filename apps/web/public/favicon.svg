<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#3661cf"/>
    </linearGradient>
    <linearGradient id="needle" x1="32" y1="14" x2="32" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- rounded-square base -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- subtle inner ring -->
  <circle cx="32" cy="32" r="20" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.25" fill="none"/>

  <!-- compass needle (Helmsman 🧭) — slim diamond on a slight tilt -->
  <g transform="rotate(28 32 32)">
    <path d="M32 12 L36 32 L32 52 L28 32 Z" fill="url(#needle)"/>
  </g>

  <!-- center dot -->
  <circle cx="32" cy="32" r="2.4" fill="#ffffff" fill-opacity="0.9"/>
</svg>
