name: Deploy Web to Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        env:
          # 本番 API endpoint (Container App FQDN)。secret 化推奨
          VITE_API_BASE: ${{ secrets.PROD_API_BASE_URL }}
        run: npm run build

      - name: Skip deploy if no SWA token
        if: env.SWA_TOKEN == ''
        run: echo "AZURE_STATIC_WEB_APPS_API_TOKEN not configured — skip"
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Deploy to Static Web Apps
        if: env.SWA_TOKEN != ''
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'apps/web/dist'
          skip_app_build: true
          output_location: ''
