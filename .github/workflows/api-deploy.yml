name: Deploy API to Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.dockerignore'
      - 'README.md'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-helmsman-dev
  CONTAINER_APP_NAME: helmsman-dev-api
  ACR_NAME: helmsmandevacr
  ACR_LOCATION: westus2
  IMAGE_REPO: helmsman-api
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # OIDC で Azure 認証 (Service Principal は GitHub secrets に登録)
      - name: Azure Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Skip deploy if no Azure creds
        if: env.AZURE_CLIENT_ID == ''
        run: echo "Azure secrets not configured yet — skip deploy"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      # az containerapp up --source は CLI バグ (NoneType.linux) があるため
      # ACR + az acr build + az containerapp update --image の素直な流れに分解
      - name: Ensure ACR exists
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if ! az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az acr create \
              --name "$ACR_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --sku Basic \
              --location "$ACR_LOCATION" \
              --admin-enabled true
          fi

      # Managed identity の RBAC 伝搬待ちが不安定なので admin 認証を使う
      # (admin-enabled=true で create 済)

      # ACR Tasks がサブスクで禁止されているケースに備えて runner で docker build
      - name: Set up Docker Buildx
        if: env.AZURE_CLIENT_ID != ''
        uses: docker/setup-buildx-action@v3
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Login to ACR
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: az acr login --name "$ACR_NAME"

      - name: Build & push image (runner-side)
        if: env.AZURE_CLIENT_ID != ''
        uses: docker/build-push-action@v6
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Container App image (admin auth)
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "${ACR_NAME}.azurecr.io" \
            --username "$ACR_USER" \
            --password "$ACR_PASS"
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_REPO}:${IMAGE_TAG}"
