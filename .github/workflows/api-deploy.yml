name: Deploy API to Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-helmsman-dev
  CONTAINER_APP_NAME: helmsman-dev-api
  ACR_NAME: helmsmandevacr
  ACR_LOCATION: westus2
  IMAGE_REPO: helmsman-api
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # OIDC で Azure 認証 (Service Principal は GitHub secrets に登録)
      - name: Azure Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Skip deploy if no Azure creds
        if: env.AZURE_CLIENT_ID == ''
        run: echo "Azure secrets not configured yet — skip deploy"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      # az containerapp up --source は CLI バグ (NoneType.linux) があるため
      # ACR + az acr build + az containerapp update --image の素直な流れに分解
      - name: Ensure ACR exists
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if ! az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az acr create \
              --name "$ACR_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --sku Basic \
              --location "$ACR_LOCATION" \
              --admin-enabled true
          fi

      - name: Grant Container App's managed identity AcrPull on ACR
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query identity.principalId -o tsv)
          ACR_ID=$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query id -o tsv)
          # idempotent: 既に付与済なら no-op
          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPull \
            --scope "$ACR_ID" 2>/dev/null || true

      - name: Build image in ACR
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_REPO:$IMAGE_TAG" \
            --image "$IMAGE_REPO:latest" \
            --file Dockerfile .

      - name: Update Container App image
        if: env.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          az containerapp registry set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "${ACR_NAME}.azurecr.io" \
            --identity system
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_REPO}:${IMAGE_TAG}"
